version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces:cached
    command: sleep infinity
    network_mode: service:mariadb

  mariadb:
    image: mariadb/server
    container_name: mariadb_workflow_api_dev
    restart: unless-stopped
    volumes:
      - mariadb-workflow-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workflow_api_dev

volumes:
  mariadb-workflow-data:
